name: Deploy venezuela723975.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build producción
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://venezuela723975.com/api/v1
          NEXT_PUBLIC_SITE_URL: https://venezuela723975.com

      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Añadir known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sincronizar archivos al servidor
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='*.log' \
            --exclude='assets' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/venezuela723975/

      - name: Reiniciar servicios en servidor
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            cd /var/www/venezuela723975

            chown -R root:root /var/www/venezuela723975
            cd /var/www/venezuela723975
            npm install
            npm run build
            pm2 restart v723975-api || pm2 start /var/www/venezuela723975/apps/api/dist/server.js --name v723975-api --log /var/log/venezuela723975/api.log
            pm2 restart v723975-web || pm2 start /var/www/venezuela723975/apps/web/.next/standalone/apps/web/server.js --name v723975-web --log /var/log/venezuela723975/web.log
            pm2 save
            echo "✓ Deploy completado en $(date)"
          ENDSSH

      - name: Verificar que el sitio responde
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://venezuela723975.com)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ Sitio respondiendo correctamente"
          else
            echo "⚠ Status inesperado: $STATUS"
            exit 1
          fi
